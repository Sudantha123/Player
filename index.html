<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>Alist Custom Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* මෙහි ඇත්තේ ඔයාගේ මුල් player.html හි තිබූ Style එකමය */
:root {
  --a:#6C5CE7; --a2:#a855f7; --ag:rgba(108,92,231,.35);
  --grad:linear-gradient(135deg,#6C5CE7,#a855f7,#ec4899);
  --bg:#08080c; --s:rgba(255,255,255,.04); --s2:rgba(255,255,255,.07);
  --s3:rgba(255,255,255,.10); --glass:rgba(12,12,18,.75);
  --glass2:rgba(12,12,18,.88); --b:rgba(255,255,255,.06);
  --t:#f0f0f5; --t2:rgba(255,255,255,.5); --t3:rgba(255,255,255,.3);
  --r:14px; --r2:10px; --tr:.25s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:var(--bg);color:var(--t);font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
  overflow-x:hidden;min-height:100%;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
.page{max-width:1400px;margin:0 auto}
.player{position:relative;width:100%;background:#000;aspect-ratio:16/9;
  max-height:84vh;overflow:hidden;user-select:none;-webkit-user-select:none}
.player.fs{max-height:100vh;aspect-ratio:auto}
video{width:100%;height:100%;display:block;object-fit:contain;background:#000}
.resume-bar{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--glass2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--b);border-radius:50px;padding:8px 10px 8px 16px;
  display:none;align-items:center;gap:10px;z-index:30;font-size:13px;font-weight:600;color:#ddd;
  box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:all .3s ease;white-space:nowrap}
.resume-bar.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
.resume-btn{background:var(--grad);color:#fff;border:none;border-radius:50px;
  padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.grad-top,.grad-bot{position:absolute;left:0;right:0;z-index:18;opacity:0;transition:opacity .35s;pointer-events:none}
.grad-top{top:0;height:100px;background:linear-gradient(rgba(0,0,0,.7),transparent)}
.grad-bot{bottom:0;height:200px;background:linear-gradient(transparent,rgba(0,0,0,.85))}
.player.show-ui .grad-top,.player.show-ui .grad-bot{opacity:1}
.top-bar{position:absolute;top:0;left:0;right:0;padding:16px 20px;z-index:22;
  display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(-10px);transition:all .35s ease;pointer-events:none}
.player.show-ui .top-bar{opacity:1;transform:translateY(0);pointer-events:auto}
.top-title{font-size:14px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;letter-spacing:.2px}
.loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .2s}
.loader.on{opacity:1}
.ld-spinner{width:50px;height:50px;position:relative}
.ld-spinner::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);border-top-color:var(--a);border-right-color:var(--a2);
  animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  z-index:8;transition:all .25s ease;background:var(--glass);backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.1);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.center-play.hide{opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.6)}
.center-play svg{width:28px;height:28px;fill:#fff;margin-left:3px}
.ctrl{position:absolute;bottom:0;left:0;right:0;padding:0 14px 12px;z-index:20;opacity:0;transform:translateY(8px);transition:all .35s ease;pointer-events:none}
.player.show-ui .ctrl{opacity:1;transform:translateY(0);pointer-events:auto}
.prog-outer{width:100%;padding:10px 0 6px;cursor:pointer;position:relative}
.prog-track{width:100%;height:3px;background:rgba(255,255,255,.12);border-radius:4px;position:relative}
.prog-fill{position:absolute;top:0;left:0;height:100%;background:var(--grad);border-radius:4px;box-shadow:0 0 10px var(--ag)}
.btn-row{display:flex;align-items:center;gap:2px;margin-top:2px}
.btn{background:none;border:none;color:#fff;cursor:pointer;padding:7px;display:flex;align-items:center;justify-content:center;border-radius:var(--r2)}
.btn svg{width:22px;height:22px;fill:#fff}
.spacer{flex:1}
.time-txt{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);padding:0 6px}
.spd-tag{font-size:12px;font-weight:700;padding:3px 8px;background:var(--s2);border-radius:6px}
.info{padding:22px 22px 40px}
.info-title{font-size:20px;font-weight:800;margin-bottom:14px}
</style>
</head>
<body>
<div class="page">
<div class="player" id="P">
  <video id="V" playsinline preload="auto"></video>
  <div class="grad-top"></div>
  <div class="grad-bot"></div>

  <div class="top-bar">
    <div class="top-title" id="topTitle">Custom Player</div>
  </div>

  <div class="resume-bar" id="resumeBar">
    <span>Resume Playback?</span>
    <button class="resume-btn" id="resumeBtn">Resume</button>
  </div>

  <div class="loader" id="loader"><div class="ld-spinner"></div></div>

  <div class="center-play" id="cPlay">
    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
  </div>

  <div class="ctrl" id="ctrl">
    <div class="prog-outer" id="pOuter">
      <div class="prog-track">
        <div class="prog-fill" id="pFill"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnPlay">
        <svg id="iPlay" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        <svg id="iPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
      </button>
      <span class="time-txt"><span id="tCur">0:00</span> / <span id="tDur">0:00</span></span>
      <div class="spacer"></div>
      <button class="btn"><span class="spd-tag" id="spdTag">1x</span></button>
      <button class="btn" id="btnFs">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="info">
  <div class="info-title" id="infoTitle">Alist Video Stream</div>
  <p style="color:var(--t2); font-size:13px;">මෙම ප්ලේයරය Alist direct links සමඟ වැඩ කිරීමට සැකසූවකි.</p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<script>
(function(){'use strict';

const U = new URLSearchParams(location.search);
const videoUrl = U.get('url'); // Alist $url parameter එක කියවයි
const $ = id => document.getElementById(id);
const V = $('V'), P = $('P'), loader = $('loader'), cPlay = $('cPlay');
const pFill = $('pFill'), tCur = $('tCur'), tDur = $('tDur');

if(!videoUrl) {
    $('infoTitle').textContent = "කරුණාකර වීඩියෝවක් තෝරන්න";
    return;
}

// Player initialization
function init() {
    loader.classList.add('on');
    if (videoUrl.includes('.m3u8')) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(V);
        } else if (V.canPlayType('application/vnd.apple.mpegurl')) {
            V.src = videoUrl;
        }
    } else {
        V.src = videoUrl;
    }
}

// Basic Controls
const tog = () => V.paused ? V.play() : V.pause();
$('btnPlay').onclick = tog;
cPlay.onclick = tog;

V.addEventListener('play', () => {
    $('iPlay').style.display='none'; 
    $('iPause').style.display='block';
    cPlay.classList.add('hide');
});

V.addEventListener('pause', () => {
    $('iPlay').style.display='block'; 
    $('iPause').style.display='none';
    cPlay.classList.remove('hide');
});

V.addEventListener('timeupdate', () => {
    const p = (V.currentTime / V.duration) * 100;
    pFill.style.width = p + '%';
    tCur.textContent = fmt(V.currentTime);
});

V.addEventListener('loadedmetadata', () => {
    tDur.textContent = fmt(V.duration);
    loader.classList.remove('on');
});

function fmt(s) {
    s = Math.floor(s);
    const m = ~~(s / 60), ss = s % 60;
    return m + ':' + String(ss).padStart(2, '0');
}

// UI Visibility
let hideT;
const showUI = () => {
    P.classList.add('show-ui');
    clearTimeout(hideT);
    hideT = setTimeout(() => { if(!V.paused) P.classList.remove('show-ui'); }, 3000);
};
P.onmousemove = showUI;
P.onclick = showUI;

$('btnFs').onclick = () => {
    if (!document.fullscreenElement) P.requestFullscreen();
    else document.exitFullscreen();
};

init();
})();
</script>
</body>
</html>
